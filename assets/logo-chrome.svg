<!-- Chrome Hot Rod Logo SVG: Byler & Sons (top), GARAGE (bottom) -->
<svg width="320" height="120" viewBox="0 0 320 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chrome1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f8f8"/>
      <stop offset="30%" stop-color="#b0b0b0"/>
      <stop offset="50%" stop-color="#e0e0e0"/>
      <stop offset="70%" stop-color="#888"/>
      <stop offset="100%" stop-color="#fff"/>
    </linearGradient>
    <linearGradient id="chrome2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="20%" stop-color="#b0b0b0"/>
      <stop offset="50%" stop-color="#e0e0e0"/>
      <stop offset="80%" stop-color="#888"/>
      <stop offset="100%" stop-color="#f8f8f8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <text x="50%" y="54" text-anchor="middle" font-family="'Bebas Neue', Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#chrome1)" stroke="#222" stroke-width="2" filter="url(#glow)">Byler & Sons</text>
  <text x="50%" y="104" text-anchor="middle" font-family="'Bebas Neue', Arial, sans-serif" font-size="44" font-weight="bold" fill="url(#chrome2)" stroke="#222" stroke-width="2" filter="url(#glow)" letter-spacing="12">GARAGE</text>
</svg>
